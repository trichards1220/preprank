name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: preprank
          POSTGRES_PASSWORD: preprank
          POSTGRES_DB: preprank
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install ./packages/engine

      - name: Install API dependencies
        run: |
          cd apps/api
          pip install ".[dev]"

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://preprank:preprank@localhost:5432/preprank
        run: |
          cd apps/api
          alembic upgrade head

      - name: Seed test data
        env:
          DATABASE_URL: postgresql://preprank:preprank@localhost:5432/preprank
        run: |
          python supabase/seed/seed.py --csv data/seed/2025_football_power_ratings_final.csv

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://preprank:preprank@localhost:5432/preprank
          JWT_SECRET_KEY: test-secret-for-ci
        run: |
          cd apps/api
          python -m pytest tests/ -v --tb=short

  engine-tests:
    name: Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine
        run: pip install "./packages/engine[dev]"

      - name: Run engine tests
        run: |
          cd packages/engine
          python -m pytest tests/ -v --tb=short

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          NEXT_PUBLIC_API_URL: https://api.preprank.com
        run: |
          cd apps/web
          npm run build

      - name: Lint
        run: |
          cd apps/web
          npm run lint || true
